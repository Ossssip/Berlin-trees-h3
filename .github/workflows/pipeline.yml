name: Pipeline

on:
  schedule:
    - cron: '0 3 * * 1'   # Every Monday 03:00 UTC
  # Pushes that affect the output run the pipeline: check-updates skips the tile
  # rebuild when source data is unchanged, then deploy.yml (workflow_run)
  # publishes the latest web/ + release PMTiles to Pages. Pushes touching only
  # docs/other files don't trigger a redeploy. The schedule covers data refreshes
  # regardless of paths. The checksums commit carries [skip ci], so it never
  # re-triggers this workflow.
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'pipeline/**'
      - 'dbt/**'
      - 'data/checksums.json'
      - '.github/workflows/pipeline.yml'
  workflow_dispatch:
    inputs:
      start_from:
        description: 'Start pipeline from this stage (fetch → transform → tiles)'
        type: choice
        options:
          - fetch
          - transform
          - tiles
        default: fetch

permissions:
  contents: write   # push checksums commit + upload release assets

jobs:

  # ── Job 1: lightweight WFS count check ──────────────────────────────────────
  check-updates:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      needs_update: ${{ steps.check.outputs.needs_update }}
      count_alkis_ortsteile: ${{ steps.check.outputs.count_alkis_ortsteile }}
      count_baumbestand_anlagen: ${{ steps.check.outputs.count_baumbestand_anlagen }}
      count_baumbestand_strassen: ${{ steps.check.outputs.count_baumbestand_strassen }}
      count_gruen_berlin: ${{ steps.check.outputs.count_gruen_berlin }}
      count_forstbetriebskarte: ${{ steps.check.outputs.count_forstbetriebskarte }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - run: pip install requests pyyaml

      - name: Check WFS sources
        id: check
        run: |
          set +e
          python pipeline/check_updates.py
          CODE=$?
          set -e
          if [ $CODE -eq 2 ]; then
            echo "::error::WFS check returned an error or suspicious count — aborting"
            exit 2
          fi
          echo "needs_update=$([ $CODE -eq 1 ] && echo true || echo false)" >> $GITHUB_OUTPUT

  # ── Job 2: fetch raw WFS data — one matrix job per source (non-blocking) ──────
  fetch:
    needs: check-updates
    if: |
      always() &&
      (needs.check-updates.result == 'success' || needs.check-updates.result == 'skipped') &&
      (
        (needs.check-updates.result == 'success' && needs.check-updates.outputs.needs_update == 'true') ||
        (github.event_name == 'workflow_dispatch' && inputs.start_from == 'fetch')
      )
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false   # one source failing must not skip the others
      matrix:
        source:
          - alkis_ortsteile
          - baumbestand_anlagen
          - baumbestand_strassen
          - gruen_berlin
          - forstbetriebskarte
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Install Python deps
        run: pip install -r requirements-ci.txt

      - name: Resolve source count
        run: echo "COUNT=${{ needs.check-updates.outputs[format('count_{0}', matrix.source)] }}" >> "$GITHUB_ENV"

      # Restore the complete parquet for this source. restore-keys falls back to
      # the most recent previous parquet (last-good data) on an exact-key miss,
      # so a failed fetch can still proceed on stale data. cache/restore (not
      # cache) so nothing auto-saves — we save explicitly only on a fresh fetch.
      - name: Restore raw
        id: cache
        uses: actions/cache/restore@v5
        with:
          path: data/raw/${{ matrix.source }}.parquet
          key: wfs-${{ matrix.source }}-${{ env.COUNT }}
          restore-keys: wfs-${{ matrix.source }}-

      - name: Restore checkpoint
        if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/cache/restore@v5
        with:
          path: data/raw/${{ matrix.source }}.partial.parquet
          key: wfs-${{ matrix.source }}-${{ env.COUNT }}-partial

      - name: Fetch
        id: fetch
        # A manual run reaches the fetch job only with start_from=fetch, so force
        # a fresh download even if a (possibly empty-count) cache entry exists.
        if: steps.cache.outputs.cache-hit != 'true' || github.event_name == 'workflow_dispatch'
        continue-on-error: true
        run: python pipeline/fetch_wfs.py --source ${{ matrix.source }}

      - name: Save checkpoint on failure
        if: always() && steps.fetch.outcome == 'failure'
        uses: actions/cache/save@v5
        with:
          path: data/raw/${{ matrix.source }}.partial.parquet
          key: wfs-${{ matrix.source }}-${{ env.COUNT }}-partial

      # Classify: fresh (cache hit or fetch ok), stale (fetch failed but a
      # previous parquet was restored), or hard-fail (no data at all).
      - name: Classify outcome
        id: verify
        run: |
          if [ "${{ steps.fetch.outcome }}" = "success" ] || [ "${{ steps.fetch.outcome }}" = "skipped" ]; then
            echo "stale=false" >> "$GITHUB_OUTPUT"
            echo "${{ matrix.source }}: fresh data"
          elif [ -f "data/raw/${{ matrix.source }}.parquet" ]; then
            echo "stale=true" >> "$GITHUB_OUTPUT"
            echo "::warning::${{ matrix.source }}: fetch failed — using last-good cached parquet (stale)"
          else
            echo "::error::${{ matrix.source }}: fetch failed and no cached parquet to fall back to"
            exit 1
          fi

      # Cache the freshly fetched parquet under the current-count key for the
      # transform job. Stale fallbacks are deliberately NOT saved, so the key
      # stays empty and the next run retries the fetch.
      - name: Save raw to cache
        if: steps.fetch.outcome == 'success'
        uses: actions/cache/save@v5
        with:
          path: data/raw/${{ matrix.source }}.parquet
          key: wfs-${{ matrix.source }}-${{ env.COUNT }}

      - name: Flag stale fallback
        if: steps.verify.outputs.stale == 'true'
        run: echo "${{ matrix.source }}" > stale.txt

      - name: Upload stale marker
        if: steps.verify.outputs.stale == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: stale-${{ matrix.source }}
          path: stale.txt
          retention-days: 1

  # ── Job 3: transform (init_db + dbt) ─────────────────────────────────────────
  transform:
    needs: [check-updates, fetch]
    if: |
      always() &&
      (needs.check-updates.result == 'success' || needs.check-updates.result == 'skipped') &&
      (
        needs.fetch.result == 'success' ||
        (github.event_name == 'workflow_dispatch' && inputs.start_from == 'transform')
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Install Python deps
        run: pip install -r requirements-ci.txt

      # ── Restore raw parquets saved by the fetch job ──────────────────────────

      - name: Restore raw — alkis_ortsteile
        uses: actions/cache/restore@v5
        with:
          path: data/raw/alkis_ortsteile.parquet
          key: wfs-alkis_ortsteile-${{ needs.check-updates.outputs.count_alkis_ortsteile }}
          restore-keys: wfs-alkis_ortsteile-

      - name: Restore raw — baumbestand_anlagen
        uses: actions/cache/restore@v5
        with:
          path: data/raw/baumbestand_anlagen.parquet
          key: wfs-baumbestand_anlagen-${{ needs.check-updates.outputs.count_baumbestand_anlagen }}
          restore-keys: wfs-baumbestand_anlagen-

      - name: Restore raw — baumbestand_strassen
        uses: actions/cache/restore@v5
        with:
          path: data/raw/baumbestand_strassen.parquet
          key: wfs-baumbestand_strassen-${{ needs.check-updates.outputs.count_baumbestand_strassen }}
          restore-keys: wfs-baumbestand_strassen-

      - name: Restore raw — gruen_berlin
        uses: actions/cache/restore@v5
        with:
          path: data/raw/gruen_berlin.parquet
          key: wfs-gruen_berlin-${{ needs.check-updates.outputs.count_gruen_berlin }}
          restore-keys: wfs-gruen_berlin-

      - name: Restore raw — forstbetriebskarte
        uses: actions/cache/restore@v5
        with:
          path: data/raw/forstbetriebskarte.parquet
          key: wfs-forstbetriebskarte-${{ needs.check-updates.outputs.count_forstbetriebskarte }}
          restore-keys: wfs-forstbetriebskarte-

      # ── Run dbt pipeline ─────────────────────────────────────────────────────

      - name: Transform
        run: |
          python pipeline/init_db.py
          dbt seed --profiles-dir ./dbt --project-dir ./dbt
          dbt run --profiles-dir ./dbt --project-dir ./dbt
          dbt test --profiles-dir ./dbt --project-dir ./dbt

      # ── Cache DuckDB for the tiles job ───────────────────────────────────────

      - name: Save DuckDB to cache
        uses: actions/cache/save@v5
        with:
          path: |
            data/berlin_trees.duckdb
            ~/.duckdb/extensions/
          key: duckdb-${{ runner.os }}-${{ needs.check-updates.outputs.count_alkis_ortsteile || github.run_id }}-${{ needs.check-updates.outputs.count_baumbestand_anlagen }}-${{ needs.check-updates.outputs.count_baumbestand_strassen }}-${{ needs.check-updates.outputs.count_gruen_berlin }}-${{ needs.check-updates.outputs.count_forstbetriebskarte }}

  # ── Job 4: build tiles, commit checksums, release, upload ───────────────────
  tiles:
    needs: [check-updates, transform]
    if: |
      always() &&
      (needs.check-updates.result == 'success' || needs.check-updates.result == 'skipped') &&
      (
        needs.transform.result == 'success' ||
        (github.event_name == 'workflow_dispatch' && inputs.start_from == 'tiles')
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Install Python deps
        run: pip install -r requirements-ci.txt

      - name: Get tippecanoe HEAD SHA
        id: tippecanoe-sha
        run: echo "sha=$(git ls-remote https://github.com/felt/tippecanoe.git HEAD | cut -f1)" >> $GITHUB_OUTPUT

      - name: Cache tippecanoe
        id: cache-tippecanoe
        uses: actions/cache@v5
        with:
          path: ~/.local/tippecanoe
          key: tippecanoe-${{ steps.tippecanoe-sha.outputs.sha }}-${{ runner.os }}

      - name: Install tippecanoe (felt fork)
        if: steps.cache-tippecanoe.outputs.cache-hit != 'true'
        run: |
          sudo apt-get install -y gcc g++ make libsqlite3-dev zlib1g-dev
          git clone --depth 1 https://github.com/felt/tippecanoe.git /tmp/tippecanoe
          cd /tmp/tippecanoe && make -j$(nproc)
          mkdir -p ~/.local/tippecanoe
          cp tippecanoe tile-join ~/.local/tippecanoe/

      - name: Add tippecanoe to PATH
        run: |
          sudo cp ~/.local/tippecanoe/* /usr/local/bin/
          tippecanoe --version

      - name: Cache pmtiles CLI
        id: cache-pmtiles
        uses: actions/cache@v5
        with:
          path: ~/.local/pmtiles
          key: pmtiles-v1.30.2-${{ runner.os }}

      - name: Install pmtiles CLI
        if: steps.cache-pmtiles.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/pmtiles
          curl -sL https://github.com/protomaps/go-pmtiles/releases/download/v1.30.2/go-pmtiles_1.30.2_Linux_x86_64.tar.gz \
            | tar xz -C ~/.local/pmtiles pmtiles

      - name: Add pmtiles to PATH
        run: |
          sudo cp ~/.local/pmtiles/pmtiles /usr/local/bin/
          pmtiles version

      # ── Restore DuckDB produced by the transform job ─────────────────────────

      - name: Restore DuckDB
        id: cache-duckdb
        uses: actions/cache@v5
        with:
          path: |
            data/berlin_trees.duckdb
            ~/.duckdb/extensions/
          key: duckdb-${{ runner.os }}-${{ needs.check-updates.outputs.count_alkis_ortsteile || github.run_id }}-${{ needs.check-updates.outputs.count_baumbestand_anlagen }}-${{ needs.check-updates.outputs.count_baumbestand_strassen }}-${{ needs.check-updates.outputs.count_gruen_berlin }}-${{ needs.check-updates.outputs.count_forstbetriebskarte }}
          restore-keys: duckdb-${{ runner.os }}-

      - name: Verify DuckDB exists
        run: |
          if [ ! -f data/berlin_trees.duckdb ]; then
            echo "::error::DuckDB not found in cache. Run the pipeline from 'fetch' or 'transform' first to seed the cache."
            exit 1
          fi

      - name: Build tiles
        run: python pipeline/build_tiles.py

      # ── Commit, release, deploy ──────────────────────────────────────────────

      # Sources the fetch job served from a stale cache fallback: don't advance
      # their checksum, so the next run detects them as changed and retries.
      - name: Collect stale-source markers
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          pattern: stale-*
          path: stale-markers

      - name: Build stale exclude list
        id: stale
        run: |
          list=""
          if [ -d stale-markers ]; then
            list=$(ls stale-markers 2>/dev/null | sed 's/^stale-//' | paste -sd, -)
          fi
          echo "list=$list" >> "$GITHUB_OUTPUT"
          if [ -n "$list" ]; then echo "::warning::Keeping checksums (stale fallback) for: $list"; fi

      - name: Update checksums
        run: python pipeline/check_updates.py --update --exclude "${{ steps.stale.outputs.list }}"

      - name: Commit checksums
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/checksums.json
          git diff --staged --quiet || git commit -m "chore: update checksums after pipeline run [skip ci]"
          git fetch origin main
          git rebase origin/main
          git push

      - name: Create data-latest release if it does not exist
        run: |
          gh release view data-latest 2>/dev/null || gh release create data-latest \
            --title "Data (latest)" \
            --notes "PMTiles archive, updated automatically by the weekly pipeline CI run." \
            --prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload PMTiles to release
        run: gh release upload data-latest web/public/berlin_trees.pmtiles.bundle --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

